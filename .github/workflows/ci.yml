name: ci

on:
  push:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy --workspace -- -W warnings

  clippy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@beta
      - run: cargo clippy --workspace --all-targets -- -W clippy::unwrap_used

  clippy-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy --workspace --all-targets -- -W clippy::unwrap_used

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

# nargo-test and bb-flow removed: de-vri-es/setup-noir action unavailable. Restore when a replacement is found.

  forge-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge test --root contracts

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx -y markdownlint-cli2 "**/*.md"

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash docs/lints/test_no_doc_contradictions.sh

  forbid-raw-pvthfhe-domain-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run R0.4 forbid::raw_pvthfhe_domain_tag lint
        run: bash crates/pvthfhe-domain-tags/lints/forbid_raw_pvthfhe_domain_tag.sh

  solidity-no-tautology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash contracts/test/lints/test_no_keccak_tautology.sh

  forbid-seeded-rng-outside-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run R0.7 forbid::seeded_rng_outside_demo lint
        run: cargo test -p pvthfhe-rng --test no_seeded_rng_outside_demo

  r02-gate-stub-not-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run R0.2 production-stub-allowed default gate
        run: cargo test -p pvthfhe-pvss --test gate_noop_absent_by_default

  forbid-vec-u8-in-secret-field:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run R0.3 forbid::vec_u8_in_secret_field lint
        run: cargo test -p pvthfhe-types --test secret_types_present


  no-skeleton-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run R11.1 no-skeleton-crates lint
        run: bash tests/lints/no_skeleton_crates.sh

  production-profile-quarantine:
    runs-on: ubuntu-latest
    env:
      PVTHFHE_ALLOW_RESEARCH_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: production-profile build compiles
        run: cargo build --workspace --no-default-features --features production-profile
      - name: policy and gate tests
        run: |
          cargo test --test policy_invariants
          cargo test -p pvthfhe-fhe --test gate_production_profile --no-default-features --features production-profile
      - name: resolved feature-tree audit
        run: |
          if cargo tree -e features --no-default-features --features production-profile \
             | grep -E 'feature "(mock|surrogate-compressor|surrogate-decrypt-share|trace-decrypt|demo-seeded-rng|legacy-nova|stub|production-stub-allowed|hermine)"'; then
            echo "FORBIDDEN feature present in production-profile graph"; exit 1
          fi

  forbid-micronova-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run R5.0 forbid::micronova_crate lint
        run: |
          if [ -d crates/pvthfhe-micronova ]; then
            echo "ERROR: crates/pvthfhe-micronova directory must be deleted (R5.0)"
            exit 1
          fi
          if grep -q 'pvthfhe-micronova' Cargo.toml; then
            echo "ERROR: Cargo.toml must not reference pvthfhe-micronova (R5.0)"
            exit 1
          fi
          echo "PASS: pvthfhe-micronova crate is absent"
