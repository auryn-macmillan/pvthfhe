[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Disable compiler cache so that surrogate-active warnings always appear on every `forge build`
cache = false
# Enable IR-based code generation to avoid stack-too-deep on high-arity functions
via_ir = true
# Enable optimizer for HonkVerifier.sol
optimizer = true
optimizer_runs = 200
fs_permissions = [
    { access = "read", path = "test/goldens" },
    { access = "read", path = "src" },
    { access = "read", path = "../circuits/target" },
    { access = "read", path = "../circuits/nova_state_commitment/target" },
    { access = "read-write", path = "../bench/results" },
]
