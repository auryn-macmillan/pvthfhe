[package]
name = "pvthfhe-aggregator"
version = "0.1.0"
edition = "2021"

[lints]
workspace = true

[dependencies]
pvthfhe-fhe = { path = "../pvthfhe-fhe", features = ["mock"] }
tokio = { version = "1", features = ["rt", "macros"] }
sha2 = "0.10"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand_core = { version = "0.6", features = ["getrandom"] }
thiserror = "1"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "test-util"] }
rand = "0.8"

