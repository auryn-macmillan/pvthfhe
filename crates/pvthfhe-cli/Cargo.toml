[package]
name = "pvthfhe-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pvthfhe-cli"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
pvthfhe-fhe = { path = "../pvthfhe-fhe", features = ["mock"] }
pvthfhe-aggregator = { path = "../pvthfhe-aggregator" }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rand = "0.8"
rand_core = "0.6"
sha2 = "0.10"
hex = "0.4"
anyhow = "1"
