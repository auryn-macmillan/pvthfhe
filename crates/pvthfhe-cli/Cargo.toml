[package]
name = "pvthfhe-cli"
version = "0.1.0"
edition = "2021"
license = "MIT"
default-run = "pvthfhe-cli"

[[bin]]
name = "pvthfhe-cli"
path = "src/main.rs"
required-features = ["with-fhe"]

[[bin]]
name = "pvthfhe-e2e"
path = "src/bin/pvthfhe_e2e.rs"
required-features = ["with-fhe"]

[[bin]]
name = "sonobe-min"
path = "src/bin/sonobe_min.rs"

[lints]
workspace = true

[dependencies]
pvthfhe-bench = { path = "../pvthfhe-bench", optional = true }
pvthfhe-nizk = { path = "../pvthfhe-nizk" }
pvthfhe-pvss = { path = "../pvthfhe-pvss", optional = true }
pvthfhe-fhe = { path = "../pvthfhe-fhe", optional = true }
pvthfhe-aggregator = { path = "../pvthfhe-aggregator", optional = true }
pvthfhe-compressor = { path = "../pvthfhe-compressor", optional = true }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rand = "0.8"
rand_core = "0.6"
sha2 = "0.10"
hex = "0.4"
anyhow = "1"
serde_json = "1"

[features]
default = ["with-fhe", "sonobe-compressor"]
with-fhe = [
    "dep:pvthfhe-bench",
    "dep:pvthfhe-pvss",
    "dep:pvthfhe-fhe",
    "dep:pvthfhe-aggregator",
]
mock = ["with-fhe", "pvthfhe-fhe/mock", "pvthfhe-aggregator/mock"]
probe-no-fhe = []
surrogate-compressor = []
sonobe-compressor = ["dep:pvthfhe-compressor"]

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
serde_json = "1"
