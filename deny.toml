[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "Unicode-3.0"]
unused-allowed-license = "allow"
exceptions = [
    { crate = "fhe-math", allow = ["MIT"] },
    { crate = "fhe-traits", allow = ["MIT"] },
    { crate = "prime_factorization", allow = ["CC0-1.0"] },
]
